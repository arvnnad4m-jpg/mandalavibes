<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smanda's Elegant Library</title>

<style>
/* --- BASE CSS --- */
#landing-page {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle, #4e342e 0%, #1a0f0d 100%); 
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 3000;
  transition: opacity 0.8s ease;
  text-align: center;
}
.logo-landing { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }

.welcome-title {
  font-size: 2.2em;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 20px;
  background: linear-gradient(to right, #d7ccc8 20%, #fff 50%, #d7ccc8 80%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: textShine 4s linear infinite;
}

/* User Info Styling */
#user-info {
  margin-bottom: 30px;
  color: #d7ccc8;
  font-size: 1em;
  line-height: 1.6;
}

.enter-btn { background: #5d4037; color: #fff; border: 1px solid #d4af37; padding: 12px 45px; border-radius: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.enter-btn:hover { background: #d4af37; color: #1a0f0d; box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }

body {
  margin: 0; padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #1a0f0d; 
  background-image: radial-gradient(circle at center, #3d2b27 0%, #1a0f0d 100%);
  color: #efebe9;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
}

.dust-particle {
  position: fixed; background: #ffd700; border-radius: 50%; pointer-events: none; z-index: 1; opacity: 0;
  box-shadow: 0 0 5px #ffd700; animation: float-dust linear infinite;
}
@keyframes float-dust {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
}

.main-container { width: 100%; max-width: 1100px; margin: 40px auto; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
.logo-main { width: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }

.library-shelf {
  width: 100%; background: #2d1b18; border: 12px solid #1a0f0d;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.8), 0 30px 60px rgba(0,0,0,0.6);
  padding: 80px 20px 40px 20px; position: relative; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; border-radius: 4px; box-sizing: border-box;
}

.shelf-lamp { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 160px; height: 15px; background: linear-gradient(to bottom, #444, #222); border-bottom: 3px solid #d4af37; border-radius: 8px 8px 0 0; z-index: 10; }
.lamp-glow { position: absolute; top: 7px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 700px; height: 350px; background: radial-gradient(ellipse at top, rgba(212, 175, 55, 0.15) 0%, transparent 75%); pointer-events: none; }
.library-shelf::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 25px; background: linear-gradient(to bottom, #4e342e, #2b1d1a); border-top: 3px solid #1a0f0d; }

.book-item { display: flex; flex-direction: column; align-items: center; width: 170px; z-index: 2; margin-bottom: 20px; position: relative; animation: float-book 6s ease-in-out infinite; }
@keyframes float-book { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.book-box {
  width: 160px; height: 230px; background-size: cover; background-position: center; border-radius: 2px 8px 8px 2px; cursor: pointer; position: relative; transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
  -webkit-box-reflect: below 2px linear-gradient(transparent, transparent 50%, rgba(255,255,255,0.1));
}
.book-box:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }

.book-title {
  margin-top: 25px; font-weight: bold; font-size: 0.9em; text-align: center; line-height: 1.4;
  background: linear-gradient(to right, #d7ccc8 20%, #fff 50%, #d7ccc8 80%);
  background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: textShine 3s linear infinite;
}

@keyframes textShine { to { background-position: 200% center; } }

h2 { text-align: center; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 40px; font-weight: 300; color: #d7ccc8; }

nav {
  position: fixed; bottom: 0; width: 100%; background: rgba(26, 15, 13, 0.95); backdrop-filter: blur(8px);
  display: flex; justify-content: center; gap: 20px; padding: 20px 0; z-index: 100; border-top: 1px solid rgba(212, 175, 55, 0.2);
}
.nav-btn {
  background: #4e342e; color: #d4af37; border: 1px solid #d4af37; padding: 10px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 12px;
}
.equalizer { display: flex; align-items: flex-end; gap: 3px; height: 18px; width: 22px; }
.eq-bar { width: 4px; background: #fff59d; animation: eq-anim 0.5s ease-in-out infinite alternate; animation-play-state: paused; border-radius: 1px; }
@keyframes eq-anim { 0% { height: 4px; opacity: 0.5; } 100% { height: 18px; opacity: 1; } }

.page { display: none; width: 100%; padding-bottom: 120px; }
.active { display: block; }
#reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #000; }
iframe { width: 100%; height: calc(100vh - 65px); border: none; }
.btn-back { background: #2b1d1a; color: #d4af37; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; }

.badge-new { position: absolute; top: -10px; right: -10px; background: #d4af37; color: #1a0f0d; padding: 4px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; box-shadow: 0 0 15px #d4af37; z-index: 10; }
.book-upcoming { background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg'); filter: grayscale(1) brightness(0.4); opacity: 0.7; }
.coming-soon-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); color: #1a0f0d; padding: 8px 15px; font-weight: 900; font-size: 0.75em; text-transform: uppercase; white-space: nowrap; }
</style>
</head>

<body>

<audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="bg-music" src="https://raw.githubusercontent.com/arvnnad4m-jpg/chill-backsound/bdf81b6bee6dd2efd7219431a2f09b4a9132e533/felixdump-love-shine-by-leeheesang-instrumental.mp3" preload="auto" loop></audio>

<div id="landing-page">
  <img src="https://sman2kuningan.sch.id/wp-content/themes/mading/images/logo.png" alt="Logo" class="logo-landing">
  <div class="welcome-title">Smanda Library</div>
  
  <div id="user-info">Memuat status...</div>
  
  <div id="auth-actions">
    </div>
</div>

<div id="home" class="page">
  <div class="main-container">
    <img src="https://sman2kuningan.sch.id/wp-content/themes/mading/images/logo.png" alt="Logo" class="logo-main">
    <h2>Digital Archive</h2>

    <div class="library-shelf">
      <div class="shelf-lamp"></div>
      <div class="lamp-glow"></div>
      
      <div class="book-item">
        <div class="book-box" style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg');" onclick="playClick(); openBook('https://heyzine.com/flip-book/905f390c0d.html')"></div>
        <p class="book-title">Smanda Vibes<br>(November Edition)</p>
      </div>

      <div class="book-item">
        <div class="book-box" style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg');" onclick="playClick(); openBook('https://heyzine.com/flip-book/44752310d5.html')"></div>
        <p class="book-title">Smanda Vibes<br>(January Edition)</p>
      </div>

      <div class="book-item">
        <div class="book-box" style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg');" onclick="playClick(); openBook('https://heyzine.com/flip-book/08b8d4b8c7.html')"></div>
        <p class="book-title">Smanda Vibes<br>(February Edition)</p>
      </div>

      <div class="book-item">
        <div class="book-box" style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg');" onclick="playClick(); openBook('https://online.fliphtml5.com/owlqz/bxoy/')"></div>
        <p class="book-title">Smanda Vibes<br>(March Edition)</p>
      </div>

      <div class="book-item">
        <span class="badge-new">NEW</span>
        <div class="book-box" style="background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvcGYtczYxLWppcjAxNTFjLWwtLmpwZw.jpg');" onclick="playClick(); openBook('https://heyzine.com/flip-book/1caa336792.html')"></div>
        <p class="book-title">Smanda Vibes<br>(April Edition)</p>
      </div>
    </div>
  </div>
</div>

<div id="reader" class="page">
  <button class="btn-back" onclick="playClick(); showPage('home')">← KEMBALI KE RAK</button>
  <iframe id="book-frame" src="" allowfullscreen></iframe>
</div>

<nav id="footer-nav" style="display: none;">
  <button class="nav-btn" onclick="playClick(); showPage('home')">Main Lobby</button>
  <button class="nav-btn" onclick="playClick(); logoutGoogle()">Logout</button>
  <button class="nav-btn" id="music-toggle" onclick="playClick(); toggleMusic()">
    <span id="music-text">Play Music</span>
    <div class="equalizer">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
  </button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUHtV71QGl_ToGM3UouoUIGW2aRrkL4Bw",
  authDomain: "mandala-49c5b.firebaseapp.com",
  projectId: "mandala-49c5b",
  storageBucket: "mandala-49c5b.firebasestorage.app",
  messagingSenderId: "67914805220",
  appId: "1:67914805220:web:edc90c0cae14eb2256a1f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Expose functions to global window for HTML onclick
window.loginGoogle = function () {
  signInWithPopup(auth, provider).catch((error) => alert("Login Gagal: " + error.message));
};

window.logoutGoogle = function () {
  signOut(auth).then(() => {
    location.reload(); // Refresh to lock the app again
  });
};

onAuthStateChanged(auth, (user) => {
  const userInfo = document.getElementById("user-info");
  const authActions = document.getElementById("auth-actions");
  const landing = document.getElementById("landing-page");
  const footer = document.getElementById("footer-nav");

  if (user) {
    userInfo.innerHTML = `
      <img src="${user.photoURL}" style="width:80px;height:80px;border-radius:50%;border:3px solid #d4af37;box-shadow: 0 0 15px rgba(212,175,55,0.5);">
      <br><br>Selamat Datang,<br><strong>${user.displayName}</strong>
    `;
    authActions.innerHTML = `<button class="enter-btn" onclick="playClick(); startLibrary()">Masuk Koleksi</button>`;
  } else {
    userInfo.innerHTML = "Silahkan login untuk mengakses arsip digital.";
    authActions.innerHTML = `<button class="enter-btn" onclick="playClick(); loginGoogle()">Login with Google</button>`;
    // Kembalikan ke landing jika logout
    landing.style.display = "flex";
    landing.style.opacity = "1";
    footer.style.display = "none";
  }
});
</script>

<script>
// --- UI ANIMATION & NAVIGATION ---
const bgMusic = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-toggle');
const eqBars = document.querySelectorAll('.eq-bar');

function createDust() {
  const container = document.body;
  for (let i = 0; i < 40; i++) {
    let dust = document.createElement('div');
    dust.className = 'dust-particle';
    let size = Math.random() * 3 + 1 + 'px';
    dust.style.width = size; dust.style.height = size;
    dust.style.left = Math.random() * 100 + 'vw'; dust.style.top = Math.random() * 100 + 'vh';
    dust.style.animationDuration = Math.random() * 8 + 12 + 's';
    container.appendChild(dust);
  }
}
window.onload = createDust;

function playClick() { const sfx = document.getElementById('click-sfx'); sfx.currentTime = 0; sfx.play(); }

function startLibrary() {
  const lp = document.getElementById('landing-page');
  lp.style.opacity = '0';
  setTimeout(() => { 
    lp.style.display = 'none'; 
    document.getElementById('home').classList.add('active');
    document.getElementById('footer-nav').style.display = 'flex';
  }, 800);
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'home') { document.getElementById('book-frame').src = ""; } 
  window.scrollTo(0,0);
}

function openBook(url){ 
  document.getElementById('book-frame').src = url; 
  showPage('reader'); 
}

function toggleMusic() {
  if (bgMusic.paused) {
    bgMusic.play();
    document.getElementById('music-text').textContent = "Pause Music";
    musicBtn.style.background = "#d4af37"; musicBtn.style.color = "#1a0f0d";
    eqBars.forEach(bar => bar.style.animationPlayState = 'running');
  } else {
    bgMusic.pause();
    document.getElementById('music-text').textContent = "Play Music";
    musicBtn.style.background = "#4e342e"; musicBtn.style.color = "#d4af37";
    eqBars.forEach(bar => bar.style.animationPlayState = 'paused');
  }
}
</script>

</body>
</html>
