<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunda Finance Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8F7F4; color: #4A4947; }
        .soft-shadow { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); }
        .bg-elegant { background-color: #FAF9F6; }
        .btn-primary { background-color: #8E8B82; color: white; transition: 0.3s; }
        .hidden { display: none; }
        input { background: transparent !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="page-login" class="max-w-md mx-auto p-8 pt-20">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-light text-gray-800 mb-2">Selamat Datang</h2>
            <p class="text-xs uppercase tracking-widest text-gray-400">Masuk ke Bunda Finance</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] soft-shadow space-y-6">
            <input type="email" id="login-email" placeholder="Email Bunda" class="w-full border-b border-gray-100 py-3 focus:outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full border-b border-gray-100 py-3 focus:outline-none">
            <div class="pt-4 space-y-3">
                <button onclick="window.handleLogin()" class="w-full btn-primary py-4 rounded-2xl font-semibold uppercase tracking-widest text-xs">Masuk</button>
                <button onclick="window.handleRegister()" class="w-full border border-gray-100 py-4 rounded-2xl font-semibold uppercase tracking-widest text-xs text-gray-400">Daftar Akun Baru</button>
            </div>
        </div>
    </div>

    <div id="lobby" class="max-w-md mx-auto p-6 hidden">
        <header class="mt-8 mb-10 flex justify-between items-center px-2">
            <div>
                <h1 class="text-[10px] uppercase tracking-widest text-gray-400">Cloud Sync Active</h1>
                <h2 class="text-2xl font-light text-gray-800">Bunda Finance</h2>
            </div>
            <button onclick="window.handleLogout()" class="text-[10px] text-red-300 uppercase font-bold">Keluar</button>
        </header>

        <div class="bg-elegant p-8 rounded-3xl soft-shadow border border-gray-100 mb-8 text-center">
            <p class="text-sm text-gray-500 mb-2">Saldo Anda</p>
            <h3 id="lobby-saldo" class="text-3xl font-semibold text-gray-800 tracking-tight">Rp 0</h3>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <button onclick="window.bukaForm('Pemasukan')" class="bg-white p-6 rounded-2xl border border-gray-100 soft-shadow active:scale-95 transition">
                <p class="text-xs font-medium text-gray-400 uppercase">Tambah</p>
                <p class="text-lg font-semibold text-gray-700">Masuk</p>
            </button>
            <button onclick="window.bukaForm('Pengeluaran')" class="bg-white p-6 rounded-2xl border border-gray-100 soft-shadow active:scale-95 transition">
                <p class="text-xs font-medium text-gray-400 uppercase">Tambah</p>
                <p class="text-lg font-semibold text-gray-700">Keluar</p>
            </button>
        </div>

        <div class="space-y-3">
            <h4 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4 px-2">Kategori</h4>
            <div id="category-btns" class="space-y-3">
                </div>
        </div>
    </div>

    <div id="page-category" class="max-w-md mx-auto p-6 hidden">
        <button onclick="window.tutupHalaman()" class="text-gray-400 mb-8 text-xs uppercase tracking-widest">← Kembali</button>
        <h2 id="cat-title" class="text-4xl font-light text-gray-800 mb-8 underline decoration-gray-100">...</h2>
        <div id="cat-list-container" class="space-y-4"></div>
    </div>

    <div id="page-form" class="max-w-md mx-auto p-6 hidden">
        <button onclick="window.tutupHalaman()" class="text-gray-400 mb-8 text-xs uppercase tracking-widest">← Batal</button>
        <div class="bg-white p-10 rounded-[2.5rem] soft-shadow space-y-8">
            <input type="text" id="input-ket" placeholder="Keterangan" class="w-full border-b border-gray-100 py-2 focus:outline-none text-lg">
            <input type="number" id="input-nominal" placeholder="Nominal Rp" class="w-full border-b border-gray-100 py-2 text-3xl font-semibold focus:outline-none">
            <div id="group-kategori">
                <select id="input-kategori" class="w-full border-b border-gray-100 py-2 bg-transparent">
                    <option value="Dapur">Dapur</option>
                    <option value="Anak2">Anak-anak</option>
                    <option value="Kantor">Kantor</option>
                    <option value="Kebersihan">Kebersihan</option>
                    <option value="Kesehatan">Kesehatan</option>
                </select>
            </div>
            <button onclick="window.simpanData()" class="w-full btn-primary py-5 rounded-2xl font-semibold uppercase tracking-widest text-xs">Simpan Data</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALhzck7t5zIZCQ5boOwTEUSKNKWMoc_Yo",
            authDomain: "bunda-finance.firebaseapp.com",
            projectId: "bunda-finance",
            storageBucket: "bunda-finance.firebasestorage.app",
            messagingSenderId: "932937057088",
            appId: "1:932937057088:web:5bba352a76a2b96751b0a5",
            databaseURL: "https://bunda-finance-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userUID = null;
        let allData = [];
        let currentMode = 'Pemasukan';

        // AUTH TRACKER
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('lobby').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('page-login').classList.remove('hidden');
                document.getElementById('lobby').classList.add('hidden');
            }
        });

        // LOGIN & REGISTER
        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Gagal masuk: " + err.message));
        };

        window.handleRegister = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Akun Bunda berhasil dibuat!")).catch(err => alert("Gagal daftar: " + err.message));
        };

        window.handleLogout = () => signOut(auth);

        // DATABASE LOAD
        function loadData() {
            const userRef = ref(db, 'users/' + userUID);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                allData = data ? Object.values(data).reverse() : [];
                updateSaldo();
            });
        }

        function updateSaldo() {
            let total = 0;
            allData.forEach(item => {
                if (item.tipe === 'Pemasukan') total += item.nominal;
                else total -= item.nominal;
            });
            document.getElementById('lobby-saldo').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        // NAVIGASI & SIMPAN (Global Functions)
        window.bukaForm = (mode) => {
            currentMode = mode;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('page-form').classList.remove('hidden');
            document.getElementById('group-kategori').style.display = mode === 'Pemasukan' ? 'none' : 'block';
        };

        window.tutupHalaman = () => {
            document.getElementById('page-form').classList.add('hidden');
            document.getElementById('page-category').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
        };

        window.bukaBerandaKategori = (kat) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('page-category').classList.remove('hidden');
            document.getElementById('cat-title').innerText = kat === 'Anak2' ? 'Anak-anak' : kat;
            const container = document.getElementById('cat-list-container');
            const filtered = allData.filter(i => i.kategori === kat);
            container.innerHTML = filtered.length ? '' : '<p class="text-center py-10 text-gray-300 italic">Belum ada data</p>';
            filtered.forEach(item => {
                container.innerHTML += `<div class="bg-white p-6 rounded-2xl border border-gray-50 flex justify-between items-center soft-shadow">
                    <div><p class="font-semibold text-gray-700">${item.ket}</p><p class="text-[10px] text-gray-400">${item.tgl}</p></div>
                    <p class="text-lg font-medium text-gray-600">Rp ${item.nominal.toLocaleString('id-ID')}</p>
                </div>`;
            });
        };

        window.simpanData = () => {
            const ket = document.getElementById('input-ket').value;
            const nominal = parseInt(document.getElementById('input-nominal').value);
            if (!ket || !nominal) return alert("Isi yang lengkap ya Bunda");
            
            const userRef = ref(db, 'users/' + userUID);
            push(userRef, {
                tgl: new Date().toLocaleDateString('id-ID', {day:'numeric', month:'short'}),
                tipe: currentMode,
                ket: ket,
                nominal: nominal,
                kategori: currentMode === 'Pemasukan' ? 'Saldo Masuk' : document.getElementById('input-kategori').value
            });
            document.getElementById('input-ket').value = '';
            document.getElementById('input-nominal').value = '';
            window.tutupHalaman();
        };

        // Render Category Buttons
        const cats = [['Dapur','Dapur'], ['Anak-anak','Anak2'], ['Kantor','Kantor'], ['Kebersihan','Kebersihan'], ['Kesehatan','Kesehatan']];
        const catBtnBox = document.getElementById('category-btns');
        cats.forEach(c => {
            catBtnBox.innerHTML += `<button onclick="window.bukaBerandaKategori('${c[1]}')" class="w-full bg-white p-5 rounded-2xl border border-gray-50 flex justify-between items-center soft-shadow active:bg-gray-50">
                <span class="font-medium text-gray-700">${c[0]}</span><span class="text-gray-300">→</span>
            </button>`;
        });
    </script>
</body>
</html>
